<!DOCTYPE html>
<html>
<head>
    <title>AI Social Trust Detector</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center text-primary">
            AI Social Trust Detector
        </h1>

        <p class="text-center">
            Prakasam Police Hackathon 2026
        </p>

        <form action="/result" method="POST" enctype="multipart/form-data">

            <!-- Username -->

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>
            </div>

            <!-- Display Name -->

            <div class="mb-3">
                <label class="form-label">Display Name</label>
                <input
                    type="text"
                    name="display_name"
                    class="form-control"
                    required>
            </div>

            <!-- Bio -->

            <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea
                    name="bio"
                    class="form-control"
                    rows="3"></textarea>
            </div>

            <!-- Followers -->

            <div class="mb-3">
                <label class="form-label">Followers</label>
                <input
                    type="number"
                    name="followers"
                    class="form-control"
                    required>
            </div>

            <!-- Following -->

            <div class="mb-3">
                <label class="form-label">Following</label>
                <input
                    type="number"
                    name="following"
                    class="form-control"
                    required>
            </div>

            <!-- Posts -->

            <div class="mb-3">
                <label class="form-label">Number of Posts</label>
                <input
                    type="number"
                    name="posts"
                    class="form-control"
                    required>
            </div>

            <!-- Account Age -->

            <div class="mb-3">
                <label class="form-label">Account Age (Days)</label>
                <input
                    type="number"
                    name="account_age"
                    class="form-control"
                    required>
            </div>

            <!-- Private -->

            <div class="mb-3">
                <label class="form-label">Private Account</label>

                <select
                    name="private"
                    class="form-select">

                    <option value="1">Yes</option>
                    <option value="0">No</option>

                </select>

            </div>

            <!-- External URL -->

            <div class="mb-3">
                <label class="form-label">
                    External URL Present
                </label>

                <select
                    name="external_url"
                    class="form-select">

                    <option value="1">Yes</option>
                    <option value="0">No</option>

                </select>

            </div>

            <!-- Profile Picture -->

            <div class="mb-3">

                <label class="form-label">
                    Profile Picture Available
                </label>

                <select
                    name="profile_pic"
                    class="form-select">

                    <option value="1">Yes</option>
                    <option value="0">No</option>

                </select>

            </div>

            <!-- Upload -->

            <div class="mb-3">

                <label class="form-label">
                    Upload Profile Image
                </label>

                <input
                    type="file"
                    name="profile_image"
                    class="form-control"
                    required>

            </div>

            <button class="btn btn-primary w-100">

                🤖 Analyze Profile

            </button>

        </form>

    </div>

</div>

</body>
</html>
