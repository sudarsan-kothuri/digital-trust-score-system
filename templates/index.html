<!DOCTYPE html>
<html>
<head>
    <title>AI Social Trust Detector</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center text-primary">
            AI Social Trust Detector
        </h1>

        <p class="text-center">
            Prakasam Police Hackathon 2026
        </p>

        <form action="/result" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Display Name</label>
                <input type="text" name="display_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea name="bio" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Followers</label>
                <input type="number" name="followers" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Following</label>
                <input type="number" name="following" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Account Age (Days)</label>
                <input type="number" name="account_age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Profile Image</label>
                <input type="file" name="profile_image" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">
                Analyze Profile
            </button>

        </form>

    </div>

</div>

</body>
</html>
